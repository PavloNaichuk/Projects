services:
  app:
    build: .
    container_name: fitness_tracker_api
    restart: always
    environment:
      PROJECT_NAME: Fitness Tracker API
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/fitness_tracker_db
      SECRET_KEY: change-this-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery_worker:
    build: .
    container_name: fitness_tracker_celery_worker
    restart: always
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    environment:
      PROJECT_NAME: Fitness Tracker API
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/fitness_tracker_db
      SECRET_KEY: change-this-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    container_name: fitness_tracker_db
    restart: always
    environment:
      POSTGRES_DB: fitness_tracker_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - fitness_tracker_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: fitness_tracker_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  fitness_tracker_postgres_data: