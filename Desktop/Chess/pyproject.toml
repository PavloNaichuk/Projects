[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 120
target-version = "py311"
exclude = [
    ".venv",
    "__pycache__",
    ".pytest_cache",
    ".ruff_cache",
    "build",
    "dist",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B"]
ignore = []

[tool.ruff.lint.isort]
known-first-party = [
    "board",
    "bot",
    "file_dialogs",
    "game",
    "game_over_window",
    "graphics",
    "mode_select",
    "mouse_utils",
    "move_notation",
    "network",
    "promotion_dialog",
    "scroll_utils",
    "sidebar",
    "sound_manager",
    "ui_overlays",
    "utils",
]