name: Messenger CI

on:
  push:
    paths:
      - "Web/Messenger/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "Web/Messenger/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: messenger_db
          POSTGRES_USER: messenger_user
          POSTGRES_PASSWORD: messenger_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U messenger_user -d messenger_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      SECRET_KEY: test-secret-key
      DEBUG: "False"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: messenger_db
      DB_USER: messenger_user
      DB_PASSWORD: messenger_password
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379

    defaults:
      run:
        working-directory: Web/Messenger/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Web/Messenger/backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run backend lint
        run: python -m ruff check .

      - name: Run Django checks
        run: python manage.py check

      - name: Run backend tests
        run: python manage.py test

  frontend-tests:
    name: Frontend tests and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Web/Messenger/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Web/Messenger/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build
