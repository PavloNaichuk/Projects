name: Projects CI

on:
  push:
    paths:
      - "Web/Messenger/**"
      - "Web/FitnessTrackerAPI/**"
      - "Desktop/Chess/**"
      - ".github/workflows/ci.yml"

  pull_request:
    paths:
      - "Web/Messenger/**"
      - "Web/FitnessTrackerAPI/**"
      - "Desktop/Chess/**"
      - ".github/workflows/ci.yml"

  workflow_dispatch:

jobs:
  backend-tests:
    name: Messenger backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: messenger_db
          POSTGRES_USER: messenger_user
          POSTGRES_PASSWORD: messenger_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U messenger_user -d messenger_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      SECRET_KEY: this-is-a-long-secure-test-secret-key-for-messenger-backend-123456
      DEBUG: "False"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: messenger_db
      DB_USER: messenger_user
      DB_PASSWORD: messenger_password
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379

    defaults:
      run:
        working-directory: Web/Messenger/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: Web/Messenger/backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run backend lint
        run: python -m ruff check .

      - name: Audit Python dependencies
        run: python -m pip_audit -r requirements.txt

      - name: Run backend security scan
        run: python -m bandit -r . -x "./venv,./accounts/tests.py,./messaging/tests.py,./accounts/migrations,./messaging/migrations"

      - name: Run Django checks
        run: python manage.py check

      - name: Run Django deployment checks
        env:
          SECRET_KEY: this-is-a-long-secure-test-secret-key-for-deploy-checks-123456
          DEBUG: "False"
          SECURE_SSL_REDIRECT: "True"
          SESSION_COOKIE_SECURE: "True"
          CSRF_COOKIE_SECURE: "True"
          SECURE_HSTS_SECONDS: 31536000
          SECURE_HSTS_INCLUDE_SUBDOMAINS: "True"
          SECURE_HSTS_PRELOAD: "True"
        run: python manage.py check --deploy

      - name: Run backend tests with coverage
        run: |
          python -m coverage run manage.py test
          python -m coverage report -m --fail-under=70

  frontend-tests:
    name: Messenger frontend tests and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Web/Messenger/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Web/Messenger/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build

  docker-check:
    name: Messenger Docker Compose check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Web/Messenger

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build Docker images
        run: docker compose build

      - name: Prepare production environment file
        run: cp .env.production.example .env.production

      - name: Validate production Docker Compose config
        run: docker compose -f docker-compose.prod.example.yml config

      - name: Build production Docker images
        run: docker compose -f docker-compose.prod.example.yml build

  fitness-tracker-tests:
    name: FitnessTrackerAPI tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Web/FitnessTrackerAPI

    env:
      PROJECT_NAME: Fitness Tracker API
      DATABASE_URL: sqlite:///./test.db
      SECRET_KEY: this-is-a-long-secure-test-secret-key-for-fitness-tracker-api-123456
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: Web/FitnessTrackerAPI/requirements.txt

      - name: Install FitnessTrackerAPI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run FitnessTrackerAPI lint
        run: python -m ruff check .

      - name: Run FitnessTrackerAPI tests
        run: python -m pytest -q

  fitness-tracker-docker-build:
    name: FitnessTrackerAPI Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build FitnessTrackerAPI Docker image
        run: docker build -t fitness-tracker-api-test Web/FitnessTrackerAPI

  chess-tests:
    name: Chess tests
    runs-on: ubuntu-latest

    env:
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Show repository structure
        run: |
          pwd
          ls -la
          echo "Desktop:"
          ls -la Desktop || true
          echo "Desktop/Chess:"
          ls -la Desktop/Chess || true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            Desktop/Chess/requirements.txt
            Desktop/Chess/requirements-dev.txt

      - name: Install Chess dependencies
        run: |
          cd Desktop/Chess
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run Chess lint
        run: |
          cd Desktop/Chess
          python -m ruff check .

      - name: Compile Chess Python files
        run: |
          cd Desktop/Chess
          python -m py_compile main.py board.py game.py graphics.py bot.py network.py mode_select.py utils.py game_over_window.py

      - name: Run Chess tests
        run: |
          cd Desktop/Chess
          python -m pytest -q